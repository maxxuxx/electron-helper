name: Publish Package

on:
  push:
    branches:
      - main

permissions:
  contents: read
  id-token: write

jobs:
  verify:
    name: Verify Node.js ${{ matrix.node-version }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        node-version:
          - 20
          - 22
          - 24

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Check package contents
        run: npm pack --dry-run

  publish:
    needs: verify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Check package contents
        run: npm pack --dry-run

      - name: Check published version
        id: published
        shell: bash
        run: |
          package_name="$(node -p "require('./package.json').name")"
          package_version="$(node -p "require('./package.json').version")"

          echo "package_name=${package_name}" >> "$GITHUB_OUTPUT"
          echo "package_version=${package_version}" >> "$GITHUB_OUTPUT"

          if npm view "${package_name}@${package_version}" version >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "${package_name}@${package_version} already exists on npm."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "${package_name}@${package_version} is not published yet."
          fi

      - name: Skip already published version
        if: steps.published.outputs.exists == 'true'
        run: echo "Skipping publish for existing version ${{ steps.published.outputs.package_name }}@${{ steps.published.outputs.package_version }}."

      - name: Publish to npm
        if: steps.published.outputs.exists != 'true'
        run: npm publish --access public
